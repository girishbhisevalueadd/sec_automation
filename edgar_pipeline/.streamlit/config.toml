[theme]
# Default appearance is LIGHT. Users can switch to Dark via the sidebar
# toggle - the choice persists in app/theme_preference.json. The CSS layer
# does the heavy lifting; this section just keeps the Streamlit chrome
# (header, modal dialogs) on a sensible default.
base = "light"
primaryColor = "#1D6FA4"
backgroundColor = "#F4F6FA"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1B2030"
font = "sans serif"

[server]
port = 8501
headless = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
magicEnabled = false
